<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مركز التحكم - Element Real Estate</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span style="font-size: 24px;">🏢</span>
        <h2>Control Center</h2>
      </div>

      <nav class="sidebar-nav">
        <li>
          <a href="#" data-module="dashboard" class="active">
            <span>📊</span>
            <span>لوحة التحكم</span>
          </a>
        </li>
        <li>
          <a href="#" data-module="network">
            <span>🌐</span>
            <span>مراقبة الشبكة</span>
          </a>
        </li>
        <li>
          <a href="#" data-module="crm">
            <span>👥</span>
            <span>CRM</span>
          </a>
        </li>
        <li>
          <a href="#" data-module="email">
            <span>📧</span>
            <span>البريد</span>
          </a>
        </li>
        <li>
          <a href="#" data-module="assets">
            <span>💻</span>
            <span>الأصول</span>
          </a>
        </li>
        <li>
          <a href="#" data-module="history">
            <span>📜</span>
            <span>التاريخ</span>
          </a>
        </li>
        <li>
          <a href="#" data-module="passwords">
            <span>🔐</span>
            <span>كلمات المرور</span>
          </a>
        </li>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main">
      <!-- HEADER -->
      <header class="header">
        <h1 class="header-title">لوحة التحكم الرئيسية</h1>
        <div class="header-actions">
          <button class="btn btn-secondary btn-sm">
            <span>⚙️</span>
            الإعدادات
          </button>
          <button class="btn btn-secondary btn-sm">
            <span>👤</span>
            Admin
          </button>
        </div>
      </header>

      <!-- CONTENT AREA -->
      <div class="content">
        <div style="text-align: center; padding: 50px;">
          <div class="loading"></div>
          <p style="margin-top: 20px;">جاري التحميل...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="js/main.js"></script>
</body>
</html>
